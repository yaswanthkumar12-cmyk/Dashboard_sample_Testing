name: SSH Create File Workflow

on:
  push:
    branches: [ main ]

jobs:
  ssh-create-file:
    runs-on: ubuntu-latest

    steps:
      - name: Install sshpass
      
        run: sudo apt-get update && sudo apt-get install -y sshpass

      - name: SSH and create eash.txt
        run: |
          sshpass -p "Harness@12345" ssh -o StrictHostKeyChecking=no harness@4.246.92.100 \
            "echo 'This is eash.txt content' > ~/eash.txt && echo 'File created successfully!'"
